known_gaps:
  - This pilot evaluated only one DailyMed SPL for vancomycin (Baxter Healthcare Corporation injection).
  - DailyMed returned total_results=88 for vancomycin; search-candidates.json contains a capped sample of 25.
  - First API search result was a capsule formulation; selected SPL was chosen explicitly by setid for injection metadata pilot only.
  - Other vancomycin SPLs (oral, other injectable labelers) may exist and were not evaluated.
  - This source must not be treated as a canonical or comprehensive vancomycin label source.
  - Clinical synthesis, section extraction, and monograph drafting have not been completed.
  - Reuse/license status for label-derived content remains unknown_requires_review pending human and legal review.
  - Source-selection review documented in docs/dailymed-source-selection-review.md; draft policy in
    docs/dailymed-source-selection-policy-draft.md. Candidate list suggests multiple routes
    (capsule, injection, powder); selected SPL title metadata suggests injection only — requires
    human review to affirm temporary working injectable SPL or re-select by human decision (not
    automatic). Not a clinical selection; not canonical.
